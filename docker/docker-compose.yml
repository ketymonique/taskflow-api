services:

  postgres:
    image: postgres:16
    container_name: taskflow-postgres

    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  wildfly:
    image: quay.io/wildfly/wildfly:latest
    container_name: taskflow-wildfly

    ports:
      - "8080:8080"
      - "9990:9990"